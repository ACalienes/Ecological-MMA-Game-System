site_name: Ecological MMA Games System
site_description: A constraints-led, game-based training framework for MMA
site_author: Ecological MMA

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - tables
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search
  - tags

# Staging area for raw class-recording mining; reviewed and merged into live
# pages, never published. See docs/_drafts/README.md.
exclude_docs: |
  _drafts/

